<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Icon Generator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #f97316;
      margin-bottom: 10px;
    }
    .preview {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
    }
    .preview-item {
      text-align: center;
    }
    canvas {
      border: 2px solid #e5e5e5;
      border-radius: 8px;
      display: block;
      margin-bottom: 10px;
    }
    button {
      background: #f97316;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover {
      background: #ea580c;
    }
    .controls {
      margin-bottom: 30px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }
    label {
      font-weight: 500;
      color: #333;
    }
    input[type="color"] {
      width: 60px;
      height: 40px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    select {
      padding: 8px 12px;
      border: 2px solid #e5e5e5;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Penkey POS Icon Generator</h1>
    <p>Generate PWA icons using Lucide icons</p>
    
    <div class="controls">
      <div>
        <label>Icon:</label>
        <select id="iconSelect">
          <option value="store">Store</option>
          <option value="shopping-bag">Shopping Bag</option>
          <option value="coffee">Coffee</option>
          <option value="receipt">Receipt</option>
          <option value="credit-card">Credit Card</option>
          <option value="package">Package</option>
          <option value="gift">Gift</option>
          <option value="tag">Tag</option>
        </select>
      </div>
      
      <div>
        <label>Background:</label>
        <input type="color" id="bgColor" value="#f97316">
      </div>
      
      <div>
        <label>Icon Color:</label>
        <input type="color" id="iconColor" value="#ffffff">
      </div>
      
      <button onclick="generateIcons()">Generate Icons</button>
    </div>
    
    <div class="preview">
      <div class="preview-item">
        <canvas id="canvas192" width="192" height="192"></canvas>
        <button onclick="downloadIcon(192)">Download 192x192</button>
      </div>
      <div class="preview-item">
        <canvas id="canvas512" width="512" height="512"></canvas>
        <button onclick="downloadIcon(512)">Download 512x512</button>
      </div>
    </div>
  </div>

  <script>
    // Lucide icon SVG paths
    const lucideIcons = {
      'store': 'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10',
      'shopping-bag': 'M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z M3 6h18 M16 10a4 4 0 0 1-8 0',
      'coffee': 'M18 8h1a4 4 0 0 1 0 8h-1 M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z M6 1v3 M10 1v3 M14 1v3',
      'receipt': 'M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z M16 8H8 M16 12H8 M16 16H8',
      'credit-card': 'M21 4H3a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z M1 10h22',
      'package': 'M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z M3.27 6.96L12 12.01l8.73-5.05 M12 22.08V12',
      'gift': 'M20 12v10H4V12 M2 7h20v5H2z M12 22V7 M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z',
      'tag': 'M12 2l9.5 9.5a1 1 0 0 1 0 1.414l-9 9a1 1 0 0 1-1.414 0L2 12.914V2h10z M7 7h.01'
    };

    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const bgColor = document.getElementById('bgColor').value;
      const iconColor = document.getElementById('iconColor').value;
      const iconName = document.getElementById('iconSelect').value;
      
      // Clear canvas
      ctx.clearRect(0, 0, size, size);
      
      // Draw background with rounded corners for maskable support
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, size, size);
      
      // Draw icon
      const iconSize = size * 0.5; // Icon takes 50% of canvas
      const padding = (size - iconSize) / 2;
      
      ctx.strokeStyle = iconColor;
      ctx.fillStyle = iconColor;
      ctx.lineWidth = size / 24; // Responsive line width
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      // Scale and translate to center
      ctx.save();
      ctx.translate(padding, padding);
      ctx.scale(iconSize / 24, iconSize / 24); // Lucide icons are 24x24
      
      // Draw the icon path
      const pathData = lucideIcons[iconName];
      drawSVGPath(ctx, pathData);
      
      ctx.restore();
    }

    function drawSVGPath(ctx, pathData) {
      const commands = pathData.split(/(?=[MLHVZmlhvz])/);
      
      ctx.beginPath();
      
      commands.forEach(cmd => {
        const type = cmd[0];
        const coords = cmd.slice(1).trim().split(/[\s,]+/).map(Number);
        
        switch(type) {
          case 'M':
            ctx.moveTo(coords[0], coords[1]);
            break;
          case 'L':
            ctx.lineTo(coords[0], coords[1]);
            break;
          case 'H':
            ctx.lineTo(coords[0], ctx.currentPoint?.y || 0);
            break;
          case 'V':
            ctx.lineTo(ctx.currentPoint?.x || 0, coords[0]);
            break;
          case 'z':
          case 'Z':
            ctx.closePath();
            break;
        }
      });
      
      ctx.stroke();
    }

    function generateIcons() {
      const canvas192 = document.getElementById('canvas192');
      const canvas512 = document.getElementById('canvas512');
      
      drawIcon(canvas192, 192);
      drawIcon(canvas512, 512);
    }

    function downloadIcon(size) {
      const canvas = document.getElementById(`canvas${size}`);
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Generate initial icons
    generateIcons();
    
    // Regenerate on control changes
    document.getElementById('iconSelect').addEventListener('change', generateIcons);
    document.getElementById('bgColor').addEventListener('input', generateIcons);
    document.getElementById('iconColor').addEventListener('input', generateIcons);
  </script>
</body>
</html>
